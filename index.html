<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARMORAI — Cyber Defense Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020406;
    color: #c8dce8;
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
    background: linear-gradient(180deg, rgba(2,4,6,0.98), transparent);
    z-index: 100;
  }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 6px; color: #e8f4ff; text-decoration: none; }
  .nav-logo span { color: #00d4ff; }
  .nav-links a, .nav-login {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: #4a6478;
    text-decoration: none;
    margin-left: 30px;
  }
  .nav-links a:hover, .nav-login:hover { color: #00d4ff; }
  .nav-login {
    border: 1px solid #00d4ff;
    padding: 10px 24px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  #hero {
    min-height: 100vh;
    padding: 140px 60px 80px;
    display: flex;
    align-items: center;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 9vw, 130px);
    line-height: 0.9;
    color: #e8f4ff;
  }
  .accent-word { color: #00d4ff; }
  .hero-desc {
    font-size: 16px;
    color: #4a6478;
    max-width: 500px;
    margin: 30px 0 40px;
  }
  .btn-primary {
    font-family: 'Share Tech Mono', monospace;
    background: #00d4ff;
    color: #020406;
    padding: 16px 36px;
    text-decoration: none;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    display: inline-block;
  }
  footer {
    text-align: center;
    padding: 40px;
    border-top: 1px solid #0f2d45;
  }
  @media (max-width: 700px) {
    nav { padding: 20px 24px; }
    #hero { padding: 120px 24px 60px; }
  }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">ARMOR<span>AI</span></a>
  <div>
    <a href="#services" class="nav-links">Services</a>
    <a href="#pricing" class="nav-links">Pricing</a>
    <a href="#contact" class="nav-links">Contact</a>
    <a href="login.html" class="nav-login">Login →</a>
  </div>
</nav>

<section id="hero">
  <div>
    <h1>DEFEND.<br>DETECT.<br><span class="accent-word">DOMINATE.</span></h1>
    <p class="hero-desc">Armorai deploys AI-driven cyber defense that learns, adapts, and eliminates threats before they breach your perimeter.</p>
    <a href="#contact" class="btn-primary">Request Access</a>
  </div>
</section>

<footer>© 2026 Armorai — Founded by Nnadi Daniel</footer>
</body>
</html>
